.dm td:last-child{border-right:none}

.dm td.sum{background:#f4f9fb;font-weight:700;text-align:center;color:var(--ba)}
.cs{display:flex;flex-direction:column;align-items:center;gap:4px}

.cv{display:inline-block;background:var(--ba);color:#fff;padding:1px 8px;border-radius:10px;font-weight:600;font-size:11px;min-width:40px;text-align:center}
.mn{font-size:11px;color:var(--mu);margin-top:8px;font-style:italic}
.sw{margin:12px 0}
.sw input[type=range]{width:100%;accent-color:var(--ba)}
.sl{display:flex;justify-content:space-between;font-size:11px;color:var(--mu);margin-top:2px}

<script>
function uc(s){
  var v=parseInt(s.value);
  s.nextElementSibling.textContent=v+'%';
  var ni=s.parentElement.querySelector('.ni');
  if(ni)ni.value=v;
  var r=s.dataset.row;
  var all=document.querySelectorAll('input[type="range"][data-row="'+r+'"]');
  var t=0;all.forEach(function(x){t+=parseInt(x.value)});
  var c=document.getElementById('sum-'+r);
  c.textContent=t+'%';
  if(t>105||t<95){c.style.color='#C8102E';c.style.background='#fdeaea'}
  else{c.style.color='var(--ba)';c.style.background='#f4f9fb'}
}
function ucn(n){
  var v=parseInt(n.value)||0;
  if(v<0)v=0;if(v>100)v=100;n.value=v;
  var p=n.parentElement;
  var sl=p.querySelector('input[type="range"]');
  var cv=p.querySelector('.cv');
  if(sl)sl.value=v;
  if(cv)cv.textContent=v+'%';
  var r=n.dataset.row;
  var all=document.querySelectorAll('input[type="range"][data-row="'+r+'"]');
  var t=0;all.forEach(function(x){t+=parseInt(x.value)});
  var c=document.getElementById('sum-'+r);
  c.textContent=t+'%';
  if(t>105||t<95){c.style.color='#C8102E';c.style.background='#fdeaea'}
  else{c.style.color='var(--ba)';c.style.background='#f4f9fb'}
}
function tf(n){
  var rs=document.getElementsByName(n);
  var ft=document.getElementById('freetext-'+n);
  var show=false;
  for(var i=0;i<rs.length;i++){if(rs[i].checked&&rs[i].value==='other'){show=true;break}}
  ft.style.display=show?'block':'none';
  if(!show)ft.value='';
}
function gr(n){var r=document.querySelector('input[name="'+n+'"]:checked');return r?r.value:''}
function gs(r){var s=document.querySelectorAll('input[type="range"][data-row="'+r+'"]');var v=[];s.forEach(function(x){v.push(parseInt(x.value))});return v}
function gc(n){var b=document.querySelectorAll('input[name="'+n+'"]:checked');var v=[];b.forEach(function(x){v.push(x.value)});return v.join(', ')}
function gk(id){var s=document.querySelectorAll('#'+id+' select');var p=[];s.forEach(function(x,i){if(x.value)p.push((i+1)+':'+x.value)});return p.join(', ')}

function s2sync(el){
  var v=parseInt(el.value);
  el.nextElementSibling.querySelector('.sv').textContent=v+'%';
  var ni=document.getElementById('s2-num');
  if(ni)ni.value=v;
}
function s2nsync(el){
  var v=parseInt(el.value)||0;
  if(v<0)v=0;if(v>100)v=100;el.value=v;
  var sl=document.getElementById('s2-slider');
  if(sl)sl.value=v;
  var sv=el.parentElement.querySelector('.sv');
  if(sv)sv.textContent=v+'%';
}

    S7_criteria:gc('s7'),S7_other:document.getElementById('s7-other').value.trim(),

    S8b_PHOTON_DME:parseInt(gr('s8b'))||0,S8b_reason:document.getElementById('s8b-reason').value.trim(),

    S10_unmet_need:document.getElementById('s10-unmet').value.trim()
  };
  var URL='https://df502657dcfb4824875489c1734771.18.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/636339ad280944a4b964b4d86ad6db55/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=bhgjR5ig_s8sI47ra8T41G197OB7aQdS6F4d3otbhxE';
  fetch(URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d),mode:'cors'})
  .then(function(r){

      var f=document.getElementById('survey-footer');

      f.style.background='#fff';f.style.padding='0';
